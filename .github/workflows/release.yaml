name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to validate, for example v0.1.0'
        required: true
        type: string

jobs:
  npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Check package artifact
        run: bun run check:package
      - name: Typecheck
        run: bun run typecheck
      - name: Test coverage
        run: bun run coverage
      - name: Lint
        run: bun run lint
      - name: Check formatting
        run: bun run format:check
      - name: Build Storybook
        run: bun run build-storybook
      - name: Install sandbox dependencies
        working-directory: sandbox
        run: bun install --frozen-lockfile
      - name: Build sandbox Storybook
        working-directory: sandbox
        run: bun run build-storybook
      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')"
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "package.json version $PACKAGE_VERSION does not match tag $RELEASE_TAG."
            exit 1
          fi
      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME="$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).name')"
          PACKAGE_VERSION="$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping."
            exit 0
          fi

          npm publish --access public --provenance
