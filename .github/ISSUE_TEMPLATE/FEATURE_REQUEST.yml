name: Feature request
description: Suggest a new capability.
title: '[Feature]: '
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Twig code/source display
        - Syntax highlighting
        - Storybook docs/source integration
        - Sandbox or examples
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should this feature help users do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior and any API you expect.
    validations:
      required: true
